<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Studio IA v2.5 | Private Engine</title>
    <style>
        :root { --primary: #fecb00; --bg: #0a0a0a; --card: #161616; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 450px; background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        h1 { color: var(--primary); font-size: 22px; text-align: center; margin-bottom: 5px; text-transform: uppercase; }
        p.subtitle { text-align: center; font-size: 11px; color: #777; margin-bottom: 25px; }
        
        .upload-section { border: 2px dashed #333; padding: 20px; border-radius: 15px; text-align: center; transition: 0.3s; }
        .upload-section:hover { border-color: var(--primary); }
        input[type="file"] { font-size: 12px; color: #888; width: 100%; }
        
        #status { text-align: center; font-weight: bold; color: var(--primary); margin: 15px 0; font-size: 14px; min-height: 20px; }
        
        #lyric-display { background: #000; padding: 20px; border-radius: 15px; margin: 15px 0; text-align: center; font-size: 20px; font-weight: bold; color: var(--primary); border: 1px solid #222; min-height: 40px; }
        
        audio { width: 100%; filter: invert(1); margin-bottom: 15px; }
        
        textarea { width: 100%; height: 180px; background: #000; color: #0f0; border: 1px solid #333; border-radius: 10px; padding: 12px; font-family: monospace; font-size: 13px; resize: none; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-run { background: var(--primary); color: #000; }
        .btn-run:disabled { background: #333; color: #666; }
        .btn-save { background: #28a745; color: white; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>🎙️ Karaoke IA Engine</h1>
    <p class="subtitle">Whisper Large v3 Sincronización Automática</p>
    
    <div class="upload-section">
        <input type="file" id="audio-input" accept="audio/*,video/*">
        <button id="btn-ia" class="btn btn-run" onclick="ejecutarIA()">🚀 PROCESAR CON IA</button>
    </div>

    <div id="status">Esperando archivo...</div>

    <div id="lyric-display">---</div>
    <audio id="player" controls></audio>

    <textarea id="editor" placeholder="La letra sincronizada aparecerá aquí..."></textarea>
    
    <button class="btn btn-save" onclick="descargarLRC()">💾 DESCARGAR RESULTADO (.LRC)</button>
    <p style="text-align:center; font-size:9px; color:#444; margin-top:10px;">Powered by Hugging Face API | Papikto Dev</p>
</div>

<script>
    // Tu Token integrado correctamente
    const HF_TOKEN = "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"; 
    
    const player = document.getElementById('player');
    const status = document.getElementById('status');
    const editor = document.getElementById('editor');
    const display = document.getElementById('lyric-display');
    const btn = document.getElementById('btn-ia');

    let syncedData = [];

    async function ejecutarIA() {
        const fileInput = document.getElementById('audio-input');
        if (fileInput.files.length === 0) return alert("Por favor, selecciona un audio.");

        const file = fileInput.files[0];
        player.src = URL.createObjectURL(file);
        
        status.innerText = "⏳ IA Trabajando... Enviando a la nube.";
        btn.disabled = true;

        try {
            const response = await fetch("https://api-inference.huggingface.co/models/openai/whisper-large-v3", {
                headers: { "Authorization": `Bearer ${HF_TOKEN}` },
                method: "POST",
                body: file,
            });

            const data = await response.json();

            if (data.text) {
                editor.value = data.text;
                status.innerText = "✅ Sincronización Exitosa";
                autoSincronizar(data.text);
            } else {
                status.innerText = "❌ Error: La IA no respondió correctamente.";
            }
        } catch (err) {
            status.innerText = "❌ Error de Red / API.";
            console.error(err);
        } finally {
            btn.disabled = false;
        }
    }

    function autoSincronizar(texto) {
        // Dividimos el texto por frases para la previsualización
        const frases = texto.split(/[.?!]/).filter(f => f.trim().length > 2);
        const duracion = player.duration || 60;
        const offset = duracion / frases.length;
        
        syncedData = frases.map((f, i) => ({
            time: i * offset,
            text: f.trim()
        }));
        
        // Convertimos a formato LRC para el editor
        let lrcContent = syncedData.map(d => {
            let min = Math.floor(d.time / 60).toString().padStart(2, '0');
            let sec = (d.time % 60).toFixed(2).padStart(5, '0');
            return `[${min}:${sec}] ${d.text}`;
        }).join('\n');
        
        editor.value = lrcContent;
    }

    player.ontimeupdate = () => {
        const ahora = player.currentTime;
        const activa = syncedData.filter(d => d.time <= ahora).pop();
        if (activa) display.innerText = activa.text;
    };

    function descargarLRC() {
        const blob = new Blob([editor.value], {type: "text/plain"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "letra_sincronizada.lrc";
        link.click();
    }
</script>

</body>
</html>
