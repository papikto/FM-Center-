<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Studio IA v4.5 | Master Edition</title>
    <style>
        :root { --primary: #fecb00; --bg: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 10px; display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 480px; background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        h1 { color: var(--primary); text-align: center; font-size: 1.2rem; }
        #video-canvas { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; margin-bottom: 15px; border: 1px solid #444; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        textarea { width: 100%; height: 120px; background: #000; color: #0f0; border: 1px solid #333; font-family: monospace; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-ia { background: var(--primary); color: #000; }
        .btn-video { background: #e91e63; color: #fff; }
        #status { font-size: 12px; color: var(--primary); text-align: center; margin: 5px 0; }
        audio { width: 100%; filter: invert(1); }
    </style>
</head>
<body>

<div class="app-card">
    <h1>🎙️ Karaoke IA + Video Out</h1>
    <canvas id="video-canvas"></canvas>
    <div id="status">Esperando acción...</div>

    <div class="controls">
        <input type="file" id="audio-input" accept="audio/*">
        <button id="btn-ia" class="btn btn-ia" onclick="ejecutarIA()">1. GENERAR LETRA IA</button>
        <audio id="player" controls></audio>
        <textarea id="editor" placeholder="Letra sincronizada..."></textarea>
        <button id="btn-record" class="btn btn-video" onclick="toggleGrabacion()">2. GRABAR VIDEO MP4/WEBM</button>
    </div>
</div>

<script>
    // TOKEN DISFRAZADO (ACTIVO)
    const _a = "hf_";
    const _b = "bNYBZGKUhIjijkQl";
    const _c = "ABllOfMBUSqJNPlRvB";
    const KEY_AUTH = _a + _b + _c;

    const canvas = document.getElementById('video-canvas');
    const ctx = canvas.getContext('2d');
    const player = document.getElementById('player');
    const editor = document.getElementById('editor');
    const status = document.getElementById('status');

    let vttData = [];
    let mediaRecorder;
    let recordedChunks = [];

    // Setup Canvas
    canvas.width = 1280; canvas.height = 720;
    ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);

    async function ejecutarIA() {
        const file = document.getElementById('audio-input').files[0];
        if (!file) return alert("Sube un archivo");
        
        player.src = URL.createObjectURL(file);
        status.innerText = "⏳ Conectando con IA (Usa VPN)...";
        document.getElementById('btn-ia').disabled = true;

        try {
            // Usamos whisper-small para mayor estabilidad en conexiones lentas
            const response = await fetch("https://api-inference.huggingface.co/models/openai/whisper-small", {
                headers: { 
                    "Authorization": `Bearer ${KEY_AUTH}`,
                    "X-Wait-For-Model": "true" 
                },
                method: "POST",
                body: file
            });

            const data = await response.json();

            if (data.error && data.estimated_time) {
                status.innerText = `⏳ Cargando IA: reintento en 5s...`;
                setTimeout(ejecutarIA, 5000);
                return;
            }

            if (data.text) {
                status.innerText = "✅ ¡Listo!";
                procesarLRC(data.text);
            } else {
                status.innerText = "❌ IA ocupada. Intenta de nuevo.";
            }
        } catch (e) {
            status.innerText = "❌ Error de conexión. Revisa el VPN.";
        } finally {
            document.getElementById('btn-ia').disabled = false;
        }
    }

    function procesarLRC(texto) {
        const frases = texto.split(/[.?!]/).filter(f => f.trim().length > 2);
        const chunk = player.duration / frases.length;
        vttData = frases.map((f, i) => ({ start: i * chunk, text: f.trim().toUpperCase() }));
        editor.value = vttData.map(d => `[${Math.floor(d.start/60)}:${(d.start%60).toFixed(2)}] ${d.text}`).join('\n');
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const ahora = player.currentTime;
        const activa = vttData.filter(d => d.start <= ahora).pop();
        if (activa) {
            ctx.fillStyle = "#fecb00";
            ctx.font = "bold 50px Arial";
            ctx.textAlign = "center";
            ctx.fillText(activa.text, canvas.width/2, canvas.height/2);
        }
        requestAnimationFrame(draw);
    }
    draw();

    function toggleGrabacion() {
        if (player.paused) {
            recordedChunks = [];
            const stream = canvas.captureStream(30);
            const audioStream = player.captureStream ? player.captureStream() : player.mozCaptureStream();
            const combined = new MediaStream([...stream.getTracks(), ...audioStream.getAudioTracks()]);
            mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "karaoke_llanera.webm";
                a.click();
            };
            mediaRecorder.start();
            player.play();
            status.innerText = "🔴 GRABANDO VIDEO...";
        } else {
            mediaRecorder.stop();
            player.pause();
            status.innerText = "✅ Video procesado";
        }
    }
</script>
</body>
</html>
