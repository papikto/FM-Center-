<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke IA v5.0 | Engine Externo</title>
    <style>
        :root { --primary: #fecb00; --bg: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 10px; text-align: center; }
        .app-card { width: 100%; max-width: 500px; background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid #333; margin: auto; }
        iframe { width: 100%; height: 500px; border: none; border-radius: 15px; background: #fff; margin-bottom: 15px; }
        textarea { width: 100%; height: 150px; background: #000; color: #0f0; border: 1px solid #333; border-radius: 10px; padding: 10px; font-family: monospace; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; background: var(--primary); color: #000; cursor: pointer; margin-top: 10px; }
        audio { width: 100%; margin: 15px 0; filter: invert(1); }
    </style>
</head>
<body>

<div class="app-card">
    <h2 style="color:var(--primary)">🎙️ GENERADOR DE LETRAS IA</h2>
    
    <p style="font-size:12px; color:#aaa;">1. Sube tu audio aquí abajo y dale a "Submit"</p>
    <iframe src="https://sanchit-gandhi-whisper-jax.hf.space"></iframe>

    <p style="font-size:12px; color:#aaa;">2. Cuando termine, copia el texto y pégalo aquí:</p>
    <textarea id="editor" placeholder="Pega aquí el resultado de la IA..."></textarea>
    
    <p style="font-size:12px; color:#aaa;">3. Prueba tu audio localmente:</p>
    <input type="file" id="audio-local" accept="audio/*" onchange="cargarAudio(this)">
    <audio id="player" controls></audio>

    <button class="btn" onclick="descargarLRC()">💾 DESCARGAR LETRA (.LRC)</button>
</div>

<script>
    function cargarAudio(input) {
        const file = input.files[0];
        document.getElementById('player').src = URL.createObjectURL(file);
    }

    function descargarLRC() {
        const texto = document.getElementById('editor').value;
        const blob = new Blob([texto], {type: "text/plain"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "letra_karaoke.lrc";
        a.click();
    }
</script>

</body>
</html>
