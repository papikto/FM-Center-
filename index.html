<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARAOKE LLANERO PRO</title>
    <style>
        /* Estilos de alto contraste para que nada se pierda */
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            border: 2px solid #fecb00;
            border-radius: 15px;
            padding: 20px;
            background-color: #111111;
            box-sizing: border-box;
        }
        h1 { color: #fecb00; font-size: 20px; text-align: center; }
        .section {
            margin-bottom: 25px;
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }
        .btn-ia { background-color: #ffffff; color: #000000; }
        .btn-download { background-color: #fecb00; color: #000000; }
        
        textarea {
            width: 100%;
            height: 150px;
            background-color: #050505;
            color: #00ff00;
            border: 1px solid #444;
            padding: 10px;
            font-family: monospace;
            box-sizing: border-box;
            margin-top: 10px;
        }
        audio { width: 100%; margin-top: 10px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎙️ LLANERAS IA STUDIO</h1>

    <div class="section">
        <label>PASO 1: Procesar en el servidor rápido</label>
        <a href="https://huggingface.co/spaces/sanchit-gandhi/whisper-jax" target="_blank" class="btn btn-ia">🚀 ABRIR MOTOR IA</a>
        <p style="font-size: 11px; color: #aaa;">(Se abre en otra pestaña para evitar errores de red)</p>
    </div>

    <div class="section">
        <label>PASO 2: Pegar resultado aquí</label>
        <textarea id="texto-ia" placeholder="Pega aquí lo que diga la IA..."></textarea>
    </div>

    <div class="section">
        <label>PASO 3: Probar y Descargar</label>
        <input type="file" id="audio-input" accept="audio/*" onchange="previewAudio(this)">
        <audio id="player" controls></audio>
        <button class="btn btn-download" onclick="exportarLRC()">💾 GUARDAR LETRA (.LRC)</button>
    </div>
</div>

<script>
    function previewAudio(input) {
        const file = input.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            document.getElementById('player').src = url;
        }
    }

    function exportarLRC() {
        const contenido = document.getElementById('texto-ia').value;
        if (!contenido) {
            alert("Por favor, pega primero el texto generado por la IA.");
            return;
        }
        const blob = new Blob([contenido], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "karaoke_llanera.lrc";
        a.click();
    }
</script>

</body>
</html>
