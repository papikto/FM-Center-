<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Studio IA | Editor Profesional</title>
    <style>
        :root {
            --primary: #fecb00; 
            --bg: #0f0f0f;
            --card: #1e1e1e;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            text-align: center;
            padding: 10px 0;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 15px;
        }

        h1 { margin: 0; color: var(--primary); font-size: 20px; text-transform: uppercase; }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr; /* Móvil primero */
            gap: 15px;
            flex-grow: 1;
            overflow-y: auto;
        }

        @media (min-width: 768px) {
            .main-layout { grid-template-columns: 1fr 1fr; overflow: hidden; }
        }

        .panel {
            background: var(--card);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
            min-height: 400px;
        }

        .panel h2 {
            margin-top: 0;
            font-size: 16px;
            color: var(--primary);
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }

        textarea {
            flex-grow: 1;
            background: #121212;
            color: #fff;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 8px;
            resize: none;
            font-size: 14px;
            margin-bottom: 10px;
            min-height: 150px;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        button {
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-primary { background: var(--primary); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }

        .player-section {
            margin-top: 15px;
            background: #000;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #444;
        }

        #lyric-preview {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
            text-align: center;
        }

        audio { width: 100%; height: 35px; filter: invert(100%); }

        /* IA Frame */
        .iframe-container { flex-grow: 1; position: relative; border-radius: 10px; overflow: hidden; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }

        .footer { font-size: 10px; color: #555; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>🎙️ Karaoke Studio IA v1.1</h1>
</header>

<div class="main-layout">
    <div class="panel">
        <h2>📝 Editor & Sincronización</h2>
        <textarea id="editor-text" placeholder="1. Procesa el audio a la derecha.&#10;2. Copia el resultado y pégalo aquí.&#10;3. Carga el audio abajo para probar."></textarea>
        
        <div class="btn-group">
            <button class="btn-outline" onclick="limpiarEditor()">🗑️ Limpiar</button>
            <button class="btn-primary" onclick="descargarLRC()">💾 Descargar (.LRC)</button>
        </div>

        <div class="player-section">
            <div id="lyric-preview">Esperando audio...</div>
            <input type="file" id="audio-file" accept="audio/*" style="font-size: 10px; color: #888; margin-bottom: 5px;">
            <audio id="audio-player" controls></audio>
        </div>
    </div>

    <div class="panel">
        <h2>🤖 Motor Whisper IA (Rápido)</h2>
        <div class="iframe-container">
            <iframe src="https://sanchit-gandhi-whisper-jax.hf.space" allow="accelerometer; ambient-light-sensor; camera; encrypted-media; geolocation; gyroscope; hid; microphone; midi; payment; usb; vr; xr-spatial-tracking" sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-downloads"></iframe>
        </div>
    </div>
</div>

<div class="footer">
    Papikto Dev Studio - 2026 | Tecnología Whisper JAX para Sincronización
</div>

<script>
    const player = document.getElementById('audio-player');
    const preview = document.getElementById('lyric-preview');
    const editor = document.getElementById('editor-text');
    let sincronizacion = [];

    // Cargar audio local
    document.getElementById('audio-file').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            player.src = URL.createObjectURL(file);
            preview.innerText = "Audio cargado. Dale Play.";
        }
    };

    // Procesar texto pegado (Intenta detectar tiempos segundos)
    function parseTexto() {
        const text = editor.value;
        const lines = text.split('\n');
        sincronizacion = [];
        
        // Lógica simple para detectar segundos si el texto los trae
        lines.forEach(line => {
            const timeMatch = line.match(/\[(\d+:\d+\.\d+)\]/); // Formato LRC
            if (timeMatch) {
                const parts = timeMatch[1].split(':');
                const sec = parseFloat(parts[0] * 60) + parseFloat(parts[1]);
                sincronizacion.push({ time: sec, text: line.replace(timeMatch[0], "").trim() });
            } else {
                // Si no tiene tiempos, el editor los asignará en el futuro
            }
        });
    }

    player.ontimeupdate = () => {
        if (sincronizacion.length === 0) parseTexto();
        const now = player.currentTime;
        const active = sincronizacion.filter(s => s.time <= now).pop();
        if (active) {
            preview.innerText = active.text;
        }
    };

    function limpiarEditor() {
        editor.value = "";
        sincronizacion = [];
        preview.innerText = "Editor limpio.";
    }

    function descargarLRC() {
        const content = editor.value;
        if(!content) return alert("El editor está vacío");
        const blob = new Blob([content], {type: "text/plain"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "karaoke_final.lrc";
        a.click();
    }
</script>

</body>
</html>
